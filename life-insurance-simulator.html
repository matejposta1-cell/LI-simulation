<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelace Životního Pojištění - George Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
            background-color: #f0f3f5; /* George světle šedé pozadí */
            color: #1a1a1a;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .inputs-section {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06); /* Měkké, velké stíny */
        }

        .inputs-section h2 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .label {
            display: block;
            font-weight: 600;
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
        }

        .input-wrapper {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .range-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e0e5e9;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #00a9e0; /* George azurová modrá */
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 169, 224, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(0, 169, 224, 0.5);
        }

        .value-display {
            min-width: 130px;
            text-align: right;
            font-weight: 700;
            font-size: 16px;
            color: #00a9e0;
            background: #f4f8fb;
            padding: 8px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .summary-panel {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 40px;
            height: fit-content;
        }

        .summary-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f3f5;
            padding-bottom: 16px;
        }

        .summary-breakdown {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e0e5e9;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 16px;
            color: #555;
        }

        .summary-row strong {
            color: #1a1a1a;
        }

        .summary-row.discount {
            color: #43b02a; /* George zářivě zelená */
            font-weight: 700;
            background: #eef8eb;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .summary-row.discount.hidden {
            display: none;
        }

        .summary-row.final {
            border-top: 2px solid #f0f3f5;
            padding-top: 24px;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .final-price-value {
            font-size: 36px;
            font-weight: 800;
            color: #00a9e0;
            align-self: flex-end;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e0e5e9;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #43b02a;
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .summary-panel {
                position: relative;
                top: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="inputs-section">
            <h2>Nastavení pojistného krytí</h2>
            
            <div id="sliders-container">
                </div>
        </div>

        <div class="summary-panel">
            <div class="summary-title">Shrnutí modelace</div>
            
            <div class="summary-breakdown" id="breakdown">
                </div>

            <div class="summary-row">
                <span>Základní měsíční pojistné:</span>
                <strong id="base-premium">0 Kč</strong>
            </div>

            <div class="summary-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                <div style="width: 100%; display: flex; justify-content: space-between;">
                    <span>Součet pro slevu (Smrt, VO, Inv 3):</span>
                    <strong id="discount-sum">0 Kč</strong>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="discount-progress"></div>
                </div>
            </div>

            <div class="summary-row discount hidden" id="discount-row">
                <span id="discount-label">Sleva za komplexní rozsah (0%):</span>
                <span id="discount-amount">-0 Kč</span>
            </div>

            <div class="summary-row final">
                <span>Celkové měsíční pojistné k úhradě</span>
                <div class="final-price-value" id="final-premium">0 Kč</div>
            </div>
        </div>
    </div>

    <script>
        // Opravené a rozdělené definice rizik
        const risks = [
            { id: 'death', label: 'Pojištění pro případ smrti', rate: 24.50, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'illness', label: 'Vážná onemocnění', rate: 48.20, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'disability3', label: 'Invalidita 3. stupně', rate: 42.10, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'disability2', label: 'Invalidita 2. stupně', rate: 30.00, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'disability1', label: 'Invalidita 1. stupně', rate: 24.30, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'injury', label: 'Trvalé následky úrazu', rate: 13.50, max: 10000000, step: 100000, suffix: ' Kč', divisor: 100000 },
            { id: 'incapacity', label: 'Pracovní neschopnost', rate: 62.00, max: 2000, step: 100, suffix: ' Kč/den', divisor: 100 }
        ];

        const values = {};

        function formatNumber(num) {
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        // Vykreslení sliderů do HTML
        const container = document.getElementById('sliders-container');
        risks.forEach(risk => {
            values[risk.id] = 0;
            const html = `
                <div class="input-group">
                    <label class="label">${risk.label}</label>
                    <div class="input-wrapper">
                        <input type="range" class="range-slider" id="${risk.id}-slider" min="0" max="${risk.max}" step="${risk.step}" value="0">
                        <div class="value-display" id="${risk.id}-value">0${risk.suffix}</div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });

        // Výpočet ceny za jedno riziko (opravená matematika)
        function calculateRiskPrice(risk) {
            const value = values[risk.id];
            return (value / risk.divisor) * risk.rate;
        }

        function updateUI() {
            let basePremium = 0;
            let breakdownHTML = '';
            
            risks.forEach(risk => {
                const value = values[risk.id];
                const riskPrice = calculateRiskPrice(risk);
                basePremium += riskPrice;

                if (value > 0) {
                    breakdownHTML += `
                        <div class="breakdown-item">
                            <span>${risk.label}</span>
                            <strong>${formatNumber(riskPrice)} Kč</strong>
                        </div>
                    `;
                }
            });

            // Logika slev
            const discountSum = values['death'] + values['illness'] + values['disability3'];
            let discountPct = 0;
            if (discountSum >= 5000000) discountPct = 30;
            else if (discountSum >= 3000000) discountPct = 20;
            else if (discountSum >= 1000000) discountPct = 10;

            const discountAmount = basePremium * (discountPct / 100);
            const finalPremium = basePremium - discountAmount;

            // Zápis do panelu
            document.getElementById('breakdown').innerHTML = breakdownHTML;
            document.getElementById('base-premium').textContent = formatNumber(basePremium) + ' Kč';
            document.getElementById('discount-sum').textContent = formatNumber(discountSum) + ' Kč';
            
            // Progress bar slevy
            const progress = Math.min((discountSum / 5000000) * 100, 100);
            document.getElementById('discount-progress').style.width = `${progress}%`;

            const discountRow = document.getElementById('discount-row');
            if (discountPct > 0) {
                discountRow.classList.remove('hidden');
                document.getElementById('discount-label').textContent = `Sleva za rozsah (${discountPct}%):`;
                document.getElementById('discount-amount').textContent = `-${formatNumber(discountAmount)} Kč`;
            } else {
                discountRow.classList.add('hidden');
            }

            document.getElementById('final-premium').textContent = formatNumber(finalPremium) + ' Kč';
        }

        // Aktivace event listenerů
        risks.forEach(risk => {
            const slider = document.getElementById(`${risk.id}-slider`);
            const display = document.getElementById(`${risk.id}-value`);
            
            slider.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                values[risk.id] = val;
                // Už žádné dělení pro zobrazení! Píše přesně to, co je na slideru.
                display.textContent = formatNumber(val) + risk.suffix;
                updateUI();
            });
        });

        updateUI();
    </script>
</body>
</html>
