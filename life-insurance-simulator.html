<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Insurance Training Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #simulator {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #218838;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="simulator">
        <h1>Life Insurance Training Simulator</h1>
        <div class="input-group">
            <label for="age">Your Age:</label>
            <input type="number" id="age" placeholder="Enter your age">
        </div>
        <div class="input-group">
            <label for="coverage">Insurance Coverage Amount:</label>
            <input type="number" id="coverage" placeholder="Enter coverage amount">
        </div>
        <button id="calculate">Calculate Premium</button>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('calculate').onclick = function() {
            var age = document.getElementById('age').value;
            var coverage = document.getElementById('coverage').value;
            var premium;

            if (age < 30) {
                premium = coverage * 0.01;
            } else if (age < 50) {
                premium = coverage * 0.02;
            } else {
                premium = coverage * 0.03;
            }

            document.getElementById('result').innerText = 'Estimated Premium: $' + premium.toFixed(2);
        };
    </script>

</body>
</html>
