<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor pojistného</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background-color: #f4f7f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #0074e8;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .inputs-section {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .input-group {
            margin-bottom: 28px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .range-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #e0e0e0, #e0e0e0);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #0074e8;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(0, 116, 232, 0.3);
            transition: box-shadow 0.2s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 4px 8px rgba(0, 116, 232, 0.4);
        }

        .range-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #0074e8;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(0, 116, 232, 0.3);
            transition: box-shadow 0.2s;
        }

        .range-slider::-moz-range-thumb:hover {
            box-shadow: 0 4px 8px rgba(0, 116, 232, 0.4);
        }

        .value-display {
            min-width: 140px;
            text-align: right;
            font-weight: 600;
            font-size: 15px;
            color: #0074e8;
            white-space: nowrap;
        }

        .summary-panel {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .summary-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 18px;
            border-bottom: 2px solid #f4f7f9;
            padding-bottom: 12px;
        }

        .summary-breakdown {
            font-size: 12px;
            color: #666;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f4f7f9;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .summary-row.discount {
            color: #1e8e3e;
            font-weight: 600;
        }

        .summary-row.discount.hidden {
            display: none;
        }

        .summary-row.final {
            border-top: 2px solid #f4f7f9;
            padding-top: 14px;
            margin-top: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #0074e8;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .summary-panel {
                position: relative;
                top: auto;
            }
        }

        .currency {
            color: #666;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Simulátor pojistného</h1>
            <p>Vypočítejte si své měsíční pojistné na základě vybraného rozsahu pojištění</p>
        </div>

        <div class="inputs-section">
            <!-- Death Coverage -->
            <div class="input-group">
                <label class="label">Pojištění pro případ smrti</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="death-slider" min="0" max="10000000" step="100000" value="0">
                    <div class="value-display" id="death-value">0 Kč</div>
                </div>
            </div>

            <!-- Serious Illness -->
            <div class="input-group">
                <label class="label">Vážná onemocnění</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="illness-slider" min="0" max="10000000" step="100000" value="0">
                    <div class="value-display" id="illness-value">0 Kč</div>
                </div>
            </div>

            <!-- Disability Grade 3 -->
            <div class="input-group">
                <label class="label">Invalidita 3. stupně</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="disability3-slider" min="0" max="10000000" step="100000" value="0">
                    <div class="value-display" id="disability3-value">0 Kč</div>
                </div>
            </div>

            <!-- Disability Grade 1-2 -->
            <div class="input-group">
                <label class="label">Invalidita 1. a 2. stupně</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="disability12-slider" min="0" max="10000000" step="100000" value="0">
                    <div class="value-display" id="disability12-value">0 Kč</div>
                </div>
            </div>

            <!-- Permanent Injury Consequences -->
            <div class="input-group">
                <label class="label">Trvalé následky úrazu</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="injury-slider" min="0" max="10000000" step="100000" value="0">
                    <div class="value-display" id="injury-value">0 Kč</div>
                </div>
            </div>

            <!-- Work Incapacity -->
            <div class="input-group">
                <label class="label">Pracovní neschopnost</label>
                <div class="input-wrapper">
                    <input type="range" class="range-slider" id="incapacity-slider" min="0" max="2000" step="100" value="0">
                    <div class="value-display" id="incapacity-value">0 Kč/den</div>
                </div>
            </div>
        </div>

        <!-- Summary Panel -->
        <div class="summary-panel">
            <div class="summary-title">Shrnutí modelace</div>
            
            <div class="summary-breakdown" id="breakdown">
                <!-- Dynamically populated -->
            </div>

            <div class="summary-row">
                <span>Základní měsíční pojistné:</span>
                <span id="base-premium">0 Kč</span>
            </div>

            <div class="summary-row">
                <span>Součet pojistných částek pro slevu:</span>
                <span id="discount-sum">0 Kč</span>
            </div>

            <div class="summary-row discount" id="discount-row">
                <span id="discount-label">Sleva za komplexní rozsah (0%):</span>
                <span id="discount-amount">-0 Kč</span>
            </div>

            <div class="summary-row final">
                <span>Celkové měsíční pojistné:</span>
                <span id="final-premium">0 Kč</span>
            </div>
        </div>
    </div>

    <script>
        // Risk definitions
        const risks = [
            { id: 'death', label: 'Pojištění pro případ smrti', rate: 24.50, sliderId: 'death-slider', valueId: 'death-value', max: 10000000, step: 100000, suffix: ' Kč' },
            { id: 'illness', label: 'Vážná onemocnění', rate: 48.20, sliderId: 'illness-slider', valueId: 'illness-value', max: 10000000, step: 100000, suffix: ' Kč' },
            { id: 'disability3', label: 'Invalidita 3. stupně', rate: 42.10, sliderId: 'disability3-slider', valueId: 'disability3-value', max: 10000000, step: 100000, suffix: ' Kč' },
            { id: 'disability12', label: 'Invalidita 1. a 2. stupně', rate: 54.30, sliderId: 'disability12-slider', valueId: 'disability12-value', max: 10000000, step: 100000, suffix: ' Kč' },
            { id: 'injury', label: 'Trvalé následky úrazu', rate: 13.50, sliderId: 'injury-slider', valueId: 'injury-value', max: 10000000, step: 100000, suffix: ' Kč' },
            { id: 'incapacity', label: 'Pracovní neschopnost', rate: 62.00, sliderId: 'incapacity-slider', valueId: 'incapacity-value', max: 2000, step: 100, suffix: ' Kč/den', divisor: 100 }
        ];

        // Store current values
        const values = {};
        risks.forEach(risk => {
            values[risk.id] = 0;
        });

        // Format number with spaces
        function formatNumber(num) {
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        // Update value display
        function updateValueDisplay(risk) {
            const slider = document.getElementById(risk.sliderId);
            const displayElement = document.getElementById(risk.valueId);
            const value = parseInt(slider.value);
            values[risk.id] = value;

            const displayValue = risk.divisor ? value / risk.divisor : value;
            displayElement.textContent = formatNumber(displayValue) + risk.suffix;
        }

        // Calculate base price for a risk
        function calculateRiskPrice(risk) {
            const value = values[risk.id];
            const divisor = risk.divisor || 100000;
            return (value / divisor) * risk.rate;
        }

        // Update summary
        function updateSummary() {
            // Calculate base premium
            let basePremium = 0;
            risks.forEach(risk => {
                basePremium += calculateRiskPrice(risk);
            });

            // Calculate discount sum (only Smrt, Vážná onemocnění, Invalidita 3. st.)
            const discountSum = values['death'] + values['illness'] + values['disability3'];

            // Determine discount percentage
            let discountPercentage = 0;
            if (discountSum >= 5000000) {
                discountPercentage = 30;
            } else if (discountSum >= 3000000) {
                discountPercentage = 20;
            } else if (discountSum >= 1000000) {
                discountPercentage = 10;
            }

            // Calculate discount amount and final premium
            const discountAmount = basePremium * (discountPercentage / 100);
            const finalPremium = basePremium - discountAmount;

            // Update breakdown
            const breakdownDiv = document.getElementById('breakdown');
            let breakdownHTML = '';
            risks.forEach(risk => {
                if (values[risk.id] > 0) {
                    const riskPrice = calculateRiskPrice(risk);
                    const displayValue = risk.divisor ? values[risk.id] / risk.divisor : values[risk.id];
                    breakdownHTML += `<div class=\"breakdown-item\"><span>${risk.label}:</span><span>${formatNumber(displayValue)} ${risk.divisor ? 'Kč/den' : 'Kč'} → ${formatNumber(riskPrice)} Kč/měs.</span></div>`;
                }
            });
            breakdownDiv.innerHTML = breakdownHTML;

            // Update summary displays
            document.getElementById('base-premium').textContent = formatNumber(basePremium) + ' Kč';
            document.getElementById('discount-sum').textContent = formatNumber(discountSum) + ' Kč';

            // Update discount row
            const discountRow = document.getElementById('discount-row');
            const discountLabel = document.getElementById('discount-label');
            const discountAmountEl = document.getElementById('discount-amount');

            if (discountPercentage > 0) {
                discountRow.classList.remove('hidden');
                discountLabel.textContent = `Sleva za komplexní rozsah (${discountPercentage}%):`;
                discountAmountEl.textContent = `-${formatNumber(discountAmount)} Kč`;
            } else {
                discountRow.classList.add('hidden');
            }

            // Update final premium
            document.getElementById('final-premium').textContent = formatNumber(finalPremium) + ' Kč';
        }

        // Initialize event listeners
        risks.forEach(risk => {
            const slider = document.getElementById(risk.sliderId);
            slider.addEventListener('input', () => {
                updateValueDisplay(risk);
                updateSummary();
            });
        });

        // Initial update
        updateSummary();
    </script>
</body>
</html>
