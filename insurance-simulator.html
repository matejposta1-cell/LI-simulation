<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Life Insurance Training Simulator</title>\n    <style>\n        body { font-family: Arial, sans-serif; padding: 20px; }\n        h1 { color: #2c3e50; }\n        .simulator { margin-top: 20px; }\n        .result { margin-top: 10px; font-weight: bold; }\n    </style>\n</head>\n<body>\n    <h1>Life Insurance Training Simulator</h1>\n    <div class="simulator">\n        <label for="age">Age:</label>\n        <input type="number" id="age" min="0" value="30">\n        <br>\n        <label for="coverage">Coverage Amount ($):</label>\n        <input type="number" id="coverage" min="1000" value="50000">\n        <br>\n        <button id="simulate">Simulate Premium</button>\n        <div class="result" id="result"></div>\n    </div>\n    <script>\n        document.getElementById('simulate').onclick = function() {\n            const age = parseInt(document.getElementById('age').value);\n            const coverage = parseInt(document.getElementById('coverage').value);\n            const premium = calculatePremium(age, coverage);\n            document.getElementById('result').innerText = `Estimated Premium: $${premium}`;\n        };\n        function calculatePremium(age, coverage) {\n            return (coverage / 1000) * (age / 10); // Simple premium calculation\n        }\n    </script>\n</body>\n</html>
