<!DOCTYPE html>\n<html lang='cs'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Životní Pojištění Simulátor</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .container { display: flex; }\n        .column { flex: 50%; padding: 20px; }\n        #summaryPanel { position: sticky; top: 0; background-color: #f1f1f1; padding: 10px; margin-top: 10px; }\n        .slider { width: 100%; }\n    </style>\n</head>\n<body>\n    <div class='container'>\n        <div class='column'>\n            <h1>Simulátor Životního Pojištění</h1>\n            <form id='insuranceForm'>\n                <label for='coverage'>Pokrytí:</label>\n                <input type='range' id='coverage' class='slider' min='10000' max='100000' value='50000' onchange='updatePricing()'>\n                <span id='coverageValue'>50,000 Kč</span>\n                <br>\n                <label for='age'>Věk:</label>\n                <input type='range' id='age' class='slider' min='18' max='65' value='30' onchange='updatePricing()'>\n                <span id='ageValue'>30 let</span>\n                <br>\n                <label for='discount'>Sleva:</label>\n                <input type='checkbox' id='discount' onchange='updatePricing()'>\n                <label for='discount'>Získat 10% slevu</label>\n            </form>\n        </div>\n        <div class='column'>\n            <div id='summaryPanel'>\n                <h2>Souhrn</h2>\n                <p id='totalPrice'>Celková Cena: 5000 Kč</p>\n            </div>\n        </div>\n    </div>\n    <script>\n        function updatePricing() {\n            const coverage = document.getElementById('coverage').value;\n            const age = document.getElementById('age').value;\n            const discount = document.getElementById('discount').checked;\n            const basePrice = 5000;\n            let totalPrice = basePrice + (coverage / 1000) - (discount ? basePrice * 0.1 : 0);\n            document.getElementById('coverageValue').innerText = coverage + ' Kč';\n            document.getElementById('ageValue').innerText = age + ' let';\n            document.getElementById('totalPrice').innerText = 'Celková Cena: ' + totalPrice.toFixed(2) + ' Kč';\n        }\n    </script>\n</body>\n</html>
