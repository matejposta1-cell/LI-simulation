<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Insurance Simulator - George Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to the George Life Insurance Simulator</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Simulate Your Insurance</h2>
            <form>
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
                <label for="amount">Insurance Amount:</label>
                <input type="number" id="amount" name="amount" required>
                <button type="submit">Calculate</button>
            </form>
        </section>
        <section id="about">
            <h2>About This Simulator</h2>
            <p>This simulator helps you understand the potential life insurance amounts based on your age.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 George Finance Group</p>
    </footer>
</body>
</html>
